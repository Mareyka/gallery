<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../registration.css">
    <link rel="stylesheet" href="registration_darktheme.css">
    <title>Document</title>
</head>

<body>


    <div class="page_split">
        <div class="left_side">
            <p class="registration">
                Узнайте, какое произведение ищет<br>
                <span class="gradient">именно вас</span>
            </p>
        </div>
        <div class="right_side_dark">
            <!-- верх -->
            <div class="login_header">
                <a href="getin.html" style="background: none;">
                    <img src="../photo/arrow_left_light.svg" style="background: transparent;">
                    <!-- <p class="name_date_bold" style="background: transparent;">Войти в Аукцион</p> -->
                </a>
            </div>
            <!-- середина -->
            <div class="login_inputs">
                <input type="text" placeholder="Имя пользователя, номер мобильного телефона, эл. почта"
                    class="login_input_darktheme signature_regular">
                <input type="password" placeholder="Пароль" class="login_input_darktheme signature_regular">
                <button class="registration_button_full schedule_top button"
                    onclick="location.href='auction_authorized.html'">
                    Войти
                </button>
                <a class="signature_regular forget_text">Забыли пароль?</a>
            </div>
            <!-- низ -->
            <div class="login_buttons">
                <button class="registration_button_dark button" onclick="location.href='registration.html'">
                    Создать новый аккаунт
                </button>
            </div>
        </div>
    </div>

    <main>
    </main>
     <script src="../dropdown_list.js"></script>
</body>

</html>
